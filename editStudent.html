<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Faculty Portal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="{% url 'faculty_home' %}" class="navbar-brand">
                <i class="fas fa-graduation-cap"></i> Gen AI Academic
            </a>
            <ul class="navbar-menu">
                <li><a href="{% url 'faculty_home' %}"><i class="fas fa-home"></i> Faculty Home</a></li>
                <li><a href="{% url 'faculty_students' %}"><i class="fas fa-list"></i> View Students</a></li>
                <li><a href="{% url 'class_rankings' %}"><i class="fas fa-user-graduate"></i> Class Rankings</a></li>
                <li><a href="{% url 'faculty_logout' %}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                <li>
                    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                        <i class="fas fa-moon" id="themeIcon"></i>
                    </button>
                </li>
            </ul>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h2><i class="fas fa-user-edit"></i> Edit Student</h2>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <h4 style="margin: 20px 0 10px; color: #00ffd5;">Student Details</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Roll Number</label>
                        <input type="text" name="roll" class="form-control" value="{{ student.rollnumber }}" required>
                    </div>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ student.email }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mobile</label>
                        <input type="text" name="mobile" class="form-control" value="{{ student.studentmobile }}" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" value="{{ student.password }}" required>
                </div>
                
                <h4 style="margin: 30px 0 10px; color: #00ffd5;">Parent Details</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Parent Name</label>
                        <input type="text" name="parentname" class="form-control" value="{{ student.parent_name }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Parent Mobile</label>
                        <input type="text" name="parentnumber" class="form-control" value="{{ student.parent_number }}" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Parent Email</label>
                    <input type="email" name="parentemail" class="form-control" value="{{ student.parent_email }}">
                </div>
                
                <div class="form-actions" style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fas fa-save"></i> Update Student
                    </button>
                    <a href="{% url 'faculty_students' %}" class="btn btn-secondary" style="flex: 1; text-align: center; padding: 12px;">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Theme Toggle Functionality
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // Check saved theme on load
        if (localStorage.getItem('theme') === 'light') {
            document.body.setAttribute('data-theme', 'light');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }
        
        // Toggle theme on click
        themeToggle.addEventListener('click', function() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
